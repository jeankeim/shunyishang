services:
  # PostgreSQL with pgvector extension
  db:
    image: ankane/pgvector:latest
    container_name: wuxing-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: wuxing_user
      POSTGRES_PASSWORD: wuxing_password
      POSTGRES_DB: wuxing_db
    ports:
      - "5432:5432"
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
      - ./scripts/init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U wuxing_user -d wuxing_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # pgAdmin - Database management UI (optional)
  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: wuxing-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@wuxing.local
      PGADMIN_DEFAULT_PASSWORD: admin123
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    depends_on:
      - db
    profiles:
      - admin

volumes:
  postgres_data:
